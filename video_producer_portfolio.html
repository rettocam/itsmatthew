        const gridElement = document.getElementById('portfolioGrid');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const emptyState = document.getElementById('emptyState');

        // Helper function to format large numbers
        const formatViews = (num) => {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        };

        // Render the grid based on current data
        function renderGrid(data) {
            gridElement.innerHTML = '';
            
            if (data.length === 0) {
                gridElement.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            gridElement.classList.remove('hidden');
            emptyState.classList.add('hidden');

            data.forEach(vid => {
                const card = document.createElement('div');
                // Card Container (Not clickable)
                card.className = "bg-white/80 backdrop-blur-md border border-slate-200 shadow-sm rounded-xl overflow-hidden flex flex-col group";
                
                card.innerHTML = `
                    <div class="w-full aspect-square bg-slate-100 overflow-hidden relative border-b border-slate-100">
                        <img src="${vid.thumbnail}" alt="${vid.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy">
                    </div>
                    
                    <div class="p-3 flex flex-col flex-grow">
                        <h3 class="text-sm font-bold text-slate-900 mb-2 line-clamp-2 leading-snug">${vid.title}</h3>
                        
                        <div class="flex flex-wrap gap-1.5 mb-3">
                            <div class="flex items-center text-[10px] font-medium text-slate-600 bg-slate-100 px-1.5 py-0.5 rounded">
                                <span class="w-1 h-1 rounded-full bg-slate-400 mr-1"></span>
                                ${vid.niche}
                            </div>
                            <div class="flex items-center text-[10px] font-bold text-emerald-700 bg-emerald-50 px-1.5 py-0.5 rounded">
                                <span class="w-1 h-1 rounded-full bg-emerald-500 mr-1"></span>
                                ${vid.impact}
                            </div>
                        </div>

                        <div class="mt-auto pt-2.5 border-t border-slate-100 flex flex-wrap items-center justify-between gap-2">
                            <span class="text-[10px] text-slate-500 font-medium">${formatViews(vid.views)} views</span>
                            
                            <a href="${vid.link}" target="_blank" class="inline-flex items-center justify-center border border-slate-200 hover:border-brand-blue hover:text-brand-blue text-slate-600 text-[10px] font-bold rounded-md px-2 py-1 transition-all">
                                <span>${vid.platformBtn}</span>
                                <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-[8px]"></i>
                            </a>
                        </div>
                    </div>
                `;
                gridElement.appendChild(card);
            });
        }

        // Handle Sorting and Searching
        function updatePortfolio() {
            const searchTerm = searchInput.value.toLowerCase();
            const sortBy = sortSelect.value;

            // Filter
            let filteredData = vaultData.filter(vid => {
                return vid.title.toLowerCase().includes(searchTerm) || 
                       vid.niche.toLowerCase().includes(searchTerm);
            });

            // Sort
            filteredData.sort((a, b) => {
                if (sortBy === 'newest') {
                    return new Date(b.date) - new Date(a.date);
                } else if (sortBy === 'oldest') {
                    return new Date(a.date) - new Date(b.date);
                } else if (sortBy === 'views') {
                    return b.views - a.views;
                }
            });

            renderGrid(filteredData);
        }

        // Event Listeners
        searchInput.addEventListener('input', updatePortfolio);
        sortSelect.addEventListener('change', updatePortfolio);

        // Initial Render
        updatePortfolio();
    </script>
